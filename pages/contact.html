    <main class="contact-page">
        <div class="contact-container">
            
            <h1 class="contact-title">Contacteaza-te!</h1>
            
           <form class="contact-form">
    <div class="form-group">
        <label>Nume, prenume</label>
        <input type="text" name="name" placeholder="Nume, prenume">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Numar de telefon</label>
            <input type="tel" name="phone" placeholder="Numar de telefon">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Email">
        </div>
    </div>

    <div class="form-group">
        <label>Mesaj dvt.</label>
        <textarea name="message" rows="6" placeholder="Scrie mesajul tău aici..."></textarea>
    </div>

    <button type="submit" class="btn-submit">Trimite mesaj</button>
</form>
            
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div>
                <img src="../assets/logo.png" alt="BioFarm Moldova">

            </div>

            <div class="quick-links">

    <script>
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbxHCeELa_UYiWWb-QbZp7co43CYcMD803UoCK8t7-LNnSFt3JuwGQiBQ_C1TLluZbHgOg/exec";

  document.querySelector(".contact-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const btn = document.querySelector(".btn-submit");
    btn.textContent = "Se trimite...";
    btn.disabled = true;

    const data = {
      name:    this.elements["name"].value,
      phone:   this.elements["phone"].value,
      email:   this.elements["email"].value,
      message: this.elements["message"].value,
    };

    try {
      await fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      btn.textContent = "Trimis ✓";
      btn.style.background = "#4caf50";
      this.reset();
    } catch (err) {
      btn.textContent = "Eroare. Încearcă din nou.";
      btn.style.background = "#e53935";
      btn.disabled = false;
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
